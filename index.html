<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WA Motorcycle Knowledge Test</title>
<meta name="description" content="Practice questions for the Washington State motorcycle endorsement knowledge test. Bilingual English / Russian. Based on the official WA Motorcycle Operator Manual.">
<script>
/* Apply the saved theme before first paint so dark mode never flashes light. Theme = button-controlled only (default light). */
(function(){try{var t=localStorage.getItem("moto_theme");if(t!=="dark"&&t!=="light")t="light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap">
<style>
:root{
  --bg:#F4F6FA; --surface:#FFFFFF; --text:#14213D; --muted:#5A6B82;
  --primary:#1B4E8F; --primary-strong:#163F73; --correct:#146C38; --incorrect:#B42318;
  --accent:#0E7C66; --border:#DCE3EC;
  --ok-bg:#E6F4EA; --ok-text:#14532A; --err-bg:#FBEAE9; --err-text:#8A1C13;
  --citation-bg:#EAF0F7; --focus-ring:#1B4E8F; --explain-bg:#F6F4EF;
  --hover-bg:#F7FAFD;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s6:24px; --s8:32px;
  --dur-fast:140ms; --dur:200ms; --ease:cubic-bezier(0.16,1,0.3,1);
  --maxw:600px;
}
/* Theme is controlled ONLY by the header button (data-theme on <html>), not by the OS. */
:root[data-theme="dark"]{
  --bg:#0B0F1A; --surface:#141B2B; --surface-raised:#1B2536; --text:#E7ECF5; --muted:#9AA9C2;
  --primary:#5B8FD4; --primary-strong:#4D7EC2; --correct:#5BD08A; --incorrect:#F08A80;
  --accent:#56C9AB; --border:#2A364B;
  --ok-bg:#16301F; --ok-text:#A8E6BE; --err-bg:#3A1A18; --err-text:#F2B5AE;
  --citation-bg:#1C2A40; --focus-ring:#7FA8E0; --explain-bg:#1B2536;
  --hover-bg:#1B2536;
}
*{box-sizing:border-box;}
html{ -webkit-text-size-adjust:100%; }
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:16px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
body[lang="ru"] .question{ line-height:1.45; }
body[lang="ru"] .opt-text{ line-height:1.5; }
.sronly{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
}

/* ---------- Header ---------- */
.hdr{
  position:sticky; top:0; z-index:20;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:var(--s3);
  padding:0 var(--s4); height:56px;
  max-width:var(--maxw); margin-inline:auto;
}
@media(min-width:600px){ .hdr{ border-left:1px solid var(--border); border-right:1px solid var(--border); } }
.brand{ display:flex; align-items:center; gap:var(--s2); min-width:0; }
.seal{ flex:none; width:22px; height:26px; color:var(--primary); }
.wordmark{
  font-family:'Source Serif 4',Georgia,serif; font-weight:700; font-size:17px;
  color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.wordmark .full{ display:none; } .wordmark .short{ display:inline; }
@media(min-width:430px){ .wordmark .full{ display:inline; } .wordmark .short{ display:none; } }
.meta{ display:flex; align-items:center; gap:var(--s3); margin-left:auto; }
.counter{ font-size:14px; font-weight:600; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
.tally{ font-size:14px; font-weight:600; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
.tally.pass{ color:var(--correct); }

/* ---------- Language toggle ---------- */
.langtoggle{
  display:inline-flex; flex:none; border:1px solid var(--border);
  border-radius:999px; overflow:hidden; background:var(--surface);
}
.seg{
  appearance:none; border:0; background:transparent; cursor:pointer;
  min-width:48px; min-height:36px; padding:0 var(--s3);
  font-family:inherit; font-size:14px; font-weight:600; color:var(--muted);
  letter-spacing:.02em;
}
.seg[aria-checked="true"]{ background:var(--primary); color:#fff; }
.seg:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; border-radius:999px; }

/* ---------- Theme toggle button ---------- */
.themebtn{
  appearance:none; flex:none; display:flex; align-items:center; justify-content:center;
  width:40px; height:40px; min-width:40px; border:1px solid var(--border);
  border-radius:999px; background:var(--surface); color:var(--text); cursor:pointer;
  transition:border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.themebtn:hover{ border-color:var(--primary); color:var(--primary); }
.themebtn:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; }
.themebtn svg{ width:20px; height:20px; }
.themebtn .ico-sun{ display:none; }
:root[data-theme="dark"] .themebtn .ico-sun{ display:block; }
:root[data-theme="dark"] .themebtn .ico-moon{ display:none; }

/* ---------- Progress rail ---------- */
.railwrap{ max-width:var(--maxw); margin-inline:auto; }
.rail{ height:4px; background:var(--border); position:relative; overflow:hidden; }
.rail-fill{ height:100%; width:0; background:var(--primary); transition:width var(--dur) var(--ease); }

/* ---------- Layout ---------- */
.wrap{ max-width:var(--maxw); margin-inline:auto; padding:0 var(--s4) calc(28px + env(safe-area-inset-bottom)); }
@media(min-width:600px){ .wrap{ border-left:1px solid var(--border); border-right:1px solid var(--border); min-height:60vh; } }
.trust{ color:var(--muted); font-size:13px; margin:var(--s4) 0 0; }

.question{
  font-family:'Source Serif 4',Georgia,serif; font-weight:600; font-size:21px;
  line-height:1.4; color:var(--text); margin:var(--s6) 0 var(--s4);
}
.prompt{ color:var(--muted); font-size:14px; margin:0 0 var(--s3); }

/* ---------- Question figure (picture questions) ---------- */
.qfig{ margin:0 0 var(--s4); text-align:center; }
.qfig img{
  max-width:100%; max-height:320px; width:auto;
  border:1px solid var(--border); border-radius:12px;
  background:#fff; padding:10px;   /* white pad so line-art reads in dark mode */
}

/* ---------- Options ---------- */
.options{ display:flex; flex-direction:column; gap:14px; margin:0; }
.opt{
  display:flex; align-items:center; gap:var(--s3);
  width:100%; min-height:60px; padding:14px 16px;
  border:1.5px solid var(--border); border-radius:14px; background:var(--surface);
  color:var(--text); text-align:left; cursor:pointer;
  font-family:inherit; font-size:17px; font-weight:500;
  -webkit-tap-highlight-color:transparent;
  transition:border-color var(--dur-fast) var(--ease), background-color var(--dur-fast) var(--ease), transform 100ms var(--ease);
}
.opt-badge{
  flex:none; display:flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:999px;
  border:1.5px solid var(--border); color:var(--muted);
  font-size:15px; font-weight:600; background:transparent;
  transition:background-color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.opt-text{ line-height:1.45; }
@media(hover:hover){
  .opt:not([aria-disabled="true"]):hover{ border-color:var(--primary); background:var(--hover-bg); }
}
.opt:not([aria-disabled="true"]):active{ transform:scale(.985); }
.opt:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; }
.opt[aria-disabled="true"]{ cursor:default; pointer-events:none; }

.opt.correct{ background:var(--ok-bg); border-color:var(--correct); color:var(--ok-text); }
.opt.correct .opt-badge{ background:var(--correct); border-color:var(--correct); color:#fff; }
.opt.incorrect{ background:var(--err-bg); border-color:var(--incorrect); color:var(--err-text); }
.opt.incorrect .opt-badge{ background:var(--incorrect); border-color:var(--incorrect); color:#fff; }

/* ---------- Explanation ---------- */
.explain{
  margin-top:var(--s4); background:var(--explain-bg);
  border-radius:12px; padding:16px; border-left:3px solid var(--border);
}
.explain.ok{ border-left-color:var(--correct); }
.explain.err{ border-left-color:var(--incorrect); }
.explain.reveal{ animation:rise var(--dur) var(--ease); }
@keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }
.exp-status{ font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:var(--s2); }
.explain.ok .exp-status{ color:var(--ok-text); }
.explain.err .exp-status{ color:var(--err-text); }
.exp-status .mark{ font-size:17px; }
.exp-body{ font-size:16px; line-height:1.6; color:var(--text); margin:0 0 var(--s3); }
.citation{
  display:inline-flex; align-items:center; gap:6px;
  background:var(--citation-bg); color:var(--primary);
  font-size:13px; font-weight:500; padding:4px 10px; border-radius:999px;
}
.citation svg{ width:13px; height:13px; }

/* ---------- Action zone (inline, directly under the explanation) ---------- */
.actionzone{ display:flex; flex-direction:column; align-items:stretch; gap:var(--s3); margin-top:var(--s4); }
.actionzone.reveal{ animation:rise var(--dur) var(--ease); }
.nextbtn{
  appearance:none; border:0; width:100%; height:54px; border-radius:12px;
  background:var(--primary); color:#fff; font-family:inherit; font-size:17px; font-weight:600;
  cursor:pointer; transition:background-color var(--dur-fast) var(--ease);
}
.nextbtn:hover{ background:var(--primary-strong); }
.nextbtn:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; }
.restart-link{
  appearance:none; border:0; background:transparent; cursor:pointer; align-self:center;
  color:var(--muted); font-family:inherit; font-size:15px; font-weight:600;
  min-height:44px; padding:0 var(--s3);
}
.restart-link:hover{ text-decoration:underline; color:var(--text); }
.restart-link:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; border-radius:8px; }
.restart-link.confirm{ color:var(--incorrect); }

/* ---------- End card ---------- */
.endcard{ text-align:center; padding:var(--s8) 0 var(--s6); }
.endseal{ width:64px; height:64px; color:var(--accent); margin:0 auto var(--s4); }
.endhead{ font-family:'Source Serif 4',Georgia,serif; font-weight:700; font-size:26px; margin:0 0 var(--s2); color:var(--text); }
.endline{ color:var(--muted); font-size:16px; margin:0 0 var(--s6); }
.endbtns{ display:flex; flex-direction:column; gap:var(--s3); max-width:340px; margin-inline:auto; }
.btn-secondary{
  appearance:none; width:100%; height:50px; border-radius:12px;
  background:var(--surface); color:var(--primary); border:1.5px solid var(--border);
  font-family:inherit; font-size:16px; font-weight:600; cursor:pointer;
}
.btn-secondary:hover{ border-color:var(--primary); }
.btn-secondary:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:2px; }

/* ---------- Home button (logo) ---------- */
.brand.home{ cursor:pointer; background:none; border:0; padding:0; margin:0; font:inherit; color:inherit; text-align:left; }
.brand.home:focus-visible{ outline:3px solid var(--focus-ring); outline-offset:3px; border-radius:8px; }

/* ---------- Landing / info page ---------- */
#landing[hidden]{ display:none; }
.landing-card{ max-width:var(--maxw); margin-inline:auto; padding:var(--s6) var(--s4) calc(40px + env(safe-area-inset-bottom)); }
.landing-seal{ text-align:center; color:var(--primary); margin-bottom:var(--s4); }
.landing-seal svg{ width:54px; height:64px; }
.landing-title{ font-family:'Source Serif 4',Georgia,serif; font-weight:700; font-size:25px; line-height:1.3; color:var(--text); text-align:center; margin:0 0 var(--s6); }
.landing-p{ font-size:16px; line-height:1.6; color:var(--text); margin:0 0 var(--s4); }
.landing-note{ font-size:15px; line-height:1.55; color:var(--text); background:var(--explain-bg); border-left:3px solid var(--primary); border-radius:10px; padding:14px 16px; margin:0 0 var(--s4); }
.landing-work{ font-size:16px; line-height:1.6; color:var(--text); font-weight:600; margin:0 0 var(--s3); }
.landing-list{ margin:0 0 var(--s6); padding:0; list-style:none; }
.landing-list li{ position:relative; padding-left:28px; margin-bottom:12px; font-size:15px; line-height:1.55; color:var(--text); }
.landing-list li::before{ content:"✓"; position:absolute; left:0; top:0; color:var(--correct); font-weight:700; font-size:16px; }
#agreebtn{ margin-top:var(--s2); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; transition-duration:.01ms !important; }
  .explain.reveal, .actionzone.reveal{ animation:none; }
}
</style>
</head>
<body>
<header class="hdr">
  <button class="brand home" id="homebtn" type="button">
    <svg class="seal" viewBox="0 0 22 26" aria-hidden="true" fill="currentColor"><path d="M11 0L22 4v9c0 7-4.6 11-11 13C4.6 24 0 20 0 13V4L11 0z" opacity=".15"/><path d="M11 2L20 5.2v7.8c0 5.9-3.8 9.3-9 11.1-5.2-1.8-9-5.2-9-11.1V5.2L11 2zm0 2.1L4 6.6v6.4c0 4.6 2.8 7.4 7 9 4.2-1.6 7-4.4 7-9V6.6L11 4.1z"/><path d="M11 7.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L11 15.7l-3.2 1.7.6-3.6L5.8 11.3l3.6-.5L11 7.5z"/></svg>
    <span class="wordmark"><span class="full" id="wordmark-full"></span><span class="short" id="wordmark-short"></span></span>
  </button>
  <div class="meta">
    <span class="counter" id="counter"></span>
    <span class="tally" id="tally"></span>
  </div>
  <button class="themebtn" type="button" id="themebtn" aria-label="Theme">
    <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.2M12 19.8V22M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2 12h2.2M19.8 12H22M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/></svg>
  </button>
  <div class="langtoggle" role="radiogroup" id="langtoggle">
    <button class="seg" type="button" id="seg-en" data-lang="en" role="radio" aria-checked="true">EN</button>
    <button class="seg" type="button" id="seg-ru" data-lang="ru" role="radio" aria-checked="false">РУ</button>
  </div>
</header>

<div class="railwrap" id="railwrap"><div class="rail"><div class="rail-fill" id="railfill" role="progressbar" aria-valuemin="1"></div></div></div>

<main class="wrap">
  <section id="landing" hidden>
    <div class="landing-card">
      <div class="landing-seal"><svg viewBox="0 0 22 26" fill="currentColor" aria-hidden="true"><path d="M11 0L22 4v9c0 7-4.6 11-11 13C4.6 24 0 20 0 13V4L11 0z" opacity=".15"/><path d="M11 2L20 5.2v7.8c0 5.9-3.8 9.3-9 11.1-5.2-1.8-9-5.2-9-11.1V5.2L11 2zm0 2.1L4 6.6v6.4c0 4.6 2.8 7.4 7 9 4.2-1.6 7-4.4 7-9V6.6L11 4.1z"/><path d="M11 7.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L11 15.7l-3.2 1.7.6-3.6L5.8 11.3l3.6-.5L11 7.5z"/></svg></div>
      <h1 class="landing-title" id="l-title"></h1>
      <p class="landing-p" id="l-p1"></p>
      <p class="landing-note" id="l-p2"></p>
      <p class="landing-work" id="l-work"></p>
      <ul class="landing-list" id="l-bullets"></ul>
      <p class="landing-p" id="l-p4"></p>
      <button class="nextbtn" type="button" id="agreebtn"></button>
    </div>
  </section>

  <p class="trust" id="trust"><span id="trust-main"></span></p>

  <section id="quizarea">
    <h1 class="question" id="question" tabindex="-1"></h1>
    <figure class="qfig" id="qfig" hidden style="margin-top:var(--s4)"><img id="qimg" alt=""></figure>
    <p class="prompt" id="prompt"></p>
    <div class="options" id="options" role="radiogroup" aria-labelledby="question"></div>
    <div class="explain" id="explain" hidden>
      <div class="exp-status" id="exp-status"></div>
      <p class="exp-body" id="exp-body"></p>
      <span class="citation" id="citation">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3 1.5A1.5 1.5 0 0 0 1.5 3v10A1.5 1.5 0 0 0 3 14.5h10a.5.5 0 0 0 0-1H3a.5.5 0 0 1-.5-.5h10A1.5 1.5 0 0 0 14 11.5V3A1.5 1.5 0 0 0 12.5 1.5H3zm9.5 1v9H3a1.5 1.5 0 0 0-.5.085V3a.5.5 0 0 1 .5-.5h9.5z"/></svg>
        <span id="citation-text"></span>
      </span>
    </div>
    <div class="actionzone" id="actions">
      <button class="nextbtn" type="button" id="nextbtn" hidden></button>
      <button class="restart-link" type="button" id="restart-inline"></button>
    </div>
  </section>

  <section id="endarea" hidden>
    <div class="endcard">
      <svg class="endseal" viewBox="0 0 64 64" fill="none" aria-hidden="true"><circle cx="32" cy="32" r="29" stroke="currentColor" stroke-width="3" opacity=".35"/><path d="M20 33l8 8 16-18" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h2 class="endhead" id="endhead"></h2>
      <p class="endline" id="endline"></p>
      <div class="endbtns">
        <button class="btn-secondary" type="button" id="reviewbtn" hidden></button>
        <button class="btn-secondary" type="button" id="restartbtn"></button>
      </div>
    </div>
  </section>

  <div class="sronly" id="live" aria-live="polite" role="status"></div>
</main>

<script src="questions.js?v=6"></script>
<script>
(function(){
  "use strict";
  var LETTERS=["A","B","C","D"];
  var WARMUP=2;                                  // show % from the 2nd answer (avoids a lone "0%"); raise to ~5 at scale
  var SESSION_SIZE=Math.min(25,QUESTIONS.length);
  // Topic-balanced session — counts per 25-question session (from WA test research). Sum = 25.
  var TOPIC_TARGET={law:2,gear:2,controls:4,cornering:3,street:4,intersections:2,hazards:3,group:2,impairment:3};
  var TOPIC_POOLS=(function(){ var p={}; QUESTIONS.forEach(function(q,i){ var t=q.topic||"street"; (p[t]=p[t]||[]).push(i); }); return p; })();
  var restartArmed=false, restartTimer=null;
  var state={ view:"landing", order:[], pos:0, lang:"en", theme:"light", answered:false, chosen:null, score:0, answeredCount:0, missed:[] };

  function getId(id){ return document.getElementById(id); }
  function t(key,vars){
    var s=(UI[key] && UI[key][state.lang]) || (UI[key] && UI[key].en) || "";
    if(vars){ for(var k in vars){ s=s.split("{"+k+"}").join(vars[k]); } }
    return s;
  }
  function curQ(){ return QUESTIONS[ state.order[state.pos] ]; }
  function L(field){ return field[state.lang]; }
  function reduceMotion(){ return window.matchMedia("(prefers-reduced-motion: reduce)").matches; }

  function shuffle(a){ var r=a.slice(); for(var i=r.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=r[i]; r[i]=r[j]; r[j]=tmp; } return r; }
  // Deal a topic-balanced session of SESSION_SIZE. Per-topic "bags" persist in localStorage so
  // questions don't repeat within a topic until that topic's pool is exhausted (then it reshuffles).
  function dealSession(){
    var bags={};
    try{ bags=JSON.parse(localStorage.getItem("moto_bags")||"{}")||{}; }catch(e){ bags={}; }
    var picked=[];
    Object.keys(TOPIC_TARGET).forEach(function(t){
      var want=TOPIC_TARGET[t];
      var pool=TOPIC_POOLS[t]||[];
      if(!pool.length) return;
      var poolSet={}; pool.forEach(function(i){ poolSet[i]=1; });
      // drop any stale/invalid indices from an older deploy's saved bag
      var bag=(Array.isArray(bags[t])?bags[t]:[]).filter(function(i){ return poolSet[i]===1; });
      if(bag.length<want){ bag=bag.concat(shuffle(pool)); }   // refill (every pool >= its target)
      var take=Math.min(want,bag.length);
      picked=picked.concat(bag.slice(0,take));
      bags[t]=bag.slice(take);
    });
    // top up to SESSION_SIZE if any topic was short
    if(picked.length<SESSION_SIZE){
      var rest=shuffle(QUESTIONS.map(function(_,i){return i;})).filter(function(i){return picked.indexOf(i)<0;});
      picked=picked.concat(rest.slice(0,SESSION_SIZE-picked.length));
    }
    picked=picked.filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,SESSION_SIZE);
    state.order=shuffle(picked);
    try{ localStorage.setItem("moto_bags", JSON.stringify(bags)); }catch(e){}
  }

  // ---- language ----
  function bootLang(){
    var saved=null; try{ saved=localStorage.getItem("moto_lang"); }catch(e){}
    if(saved==="en"||saved==="ru"){ state.lang=saved; }
    else if((navigator.language||"").toLowerCase().indexOf("ru")===0){ state.lang="ru"; }
    document.documentElement.lang=state.lang; document.body.setAttribute("lang",state.lang);
  }
  function setLang(lang){
    if(lang!==state.lang){
      state.lang=lang;
      try{ localStorage.setItem("moto_lang",lang); }catch(e){}
      document.documentElement.lang=lang; document.body.setAttribute("lang",lang);
    }
    getId("seg-en").setAttribute("aria-checked", lang==="en");
    getId("seg-ru").setAttribute("aria-checked", lang==="ru");
    render();
  }

  function paintChrome(){
    getId("wordmark-full").textContent=t("app_title");
    getId("wordmark-short").textContent=t("wordmark_short");
    getId("trust-main").textContent=t("trust_strip");
    getId("langtoggle").setAttribute("aria-label", t("lang_aria_label"));
    getId("themebtn").setAttribute("aria-label", t(state.theme==="dark"?"theme_to_light":"theme_to_dark"));
    getId("homebtn").setAttribute("aria-label", t("home_aria"));
  }

  // ---- landing / home page ----
  function paintLanding(){
    getId("l-title").textContent=t("landing_title");
    getId("l-p1").textContent=t("landing_p1");
    getId("l-p2").textContent=t("landing_p2");
    getId("l-work").textContent=t("landing_work");
    var ul=getId("l-bullets"); ul.innerHTML="";
    ["landing_b1","landing_b2","landing_b3","landing_b4"].forEach(function(k){
      var li=document.createElement("li"); li.textContent=t(k); ul.appendChild(li);
    });
    getId("l-p4").textContent=t("landing_p4");
    getId("agreebtn").textContent=t("agree_button");
  }
  function showLanding(){ state.view="landing"; render(); window.scrollTo({top:0}); }
  function enterQuiz(skipPersist){
    if(!skipPersist){ try{ localStorage.setItem("moto_agreed","1"); }catch(e){} }
    state.view="quiz"; startAll();
  }

  // ---- theme (button-only; no OS auto-switching) ----
  function applyTheme(th){
    state.theme=(th==="dark")?"dark":"light";
    document.documentElement.setAttribute("data-theme", state.theme);
    getId("themebtn").setAttribute("aria-label", t(state.theme==="dark"?"theme_to_light":"theme_to_dark"));
  }
  function bootTheme(){
    var th=null; try{ th=localStorage.getItem("moto_theme"); }catch(e){}
    applyTheme((th==="dark"||th==="light")?th:"light");   // default light; only the button changes it after
  }
  function toggleTheme(){
    var th=(state.theme==="dark")?"light":"dark";
    try{ localStorage.setItem("moto_theme", th); }catch(e){}
    applyTheme(th);
  }

  function paintScore(){
    var el=getId("tally"); if(!el) return;
    var ac=state.answeredCount;
    if(ac<WARMUP){ el.textContent=t("score_chip_warmup",{N:state.score}); el.classList.remove("pass"); return; }
    var pct=Math.round(state.score/ac*100);
    var narrow=window.matchMedia("(max-width:380px)").matches;
    el.textContent= narrow ? t("score_chip_pct",{PCT:pct}) : t("score_chip_full",{PCT:pct,N:state.score});
    el.classList.toggle("pass", pct>=80);
  }

  function paintRestartInline(){
    var el=getId("restart-inline");
    if(restartArmed){ el.textContent=t("start_over_confirm"); el.classList.add("confirm"); }
    else{ el.textContent=t("start_over"); el.classList.remove("confirm"); }
  }

  // ---- render question ----
  function render(){
    paintChrome();
    if(state.view==="landing"){
      getId("landing").hidden=false;
      getId("trust").hidden=true; getId("quizarea").hidden=true; getId("endarea").hidden=true;
      getId("railwrap").style.visibility="hidden";
      getId("counter").style.display="none"; getId("tally").style.display="none";
      paintLanding(); return;
    }
    getId("landing").hidden=true; getId("trust").hidden=false;
    getId("railwrap").style.visibility="visible";
    getId("counter").style.display=""; getId("tally").style.display="";
    if(state.pos>=state.order.length){ renderEnd(); return; }
    getId("quizarea").hidden=false; getId("endarea").hidden=true;

    var q=curQ(), total=state.order.length, n=state.pos+1;
    getId("counter").textContent=t("progress_counter",{N:n,TOTAL:total});
    paintScore();

    var fill=getId("railfill");
    fill.style.width=(n/total*100)+"%";
    fill.setAttribute("aria-valuenow",n); fill.setAttribute("aria-valuemax",total);
    fill.setAttribute("aria-valuetext",t("progress_spoken",{N:n,TOTAL:total}));

    var qEl=getId("question");
    qEl.textContent=L(q.q).replace(/^\s*\d+[.)]\s*/,"");   // strip baked-in "1." — order is shuffled
    qEl.setAttribute("lang",state.lang);
    // picture questions: show the manual figure
    var fig=getId("qfig"), qimg=getId("qimg");
    if(q.image){ qimg.src="img/"+q.image; qimg.alt=t("figure_alt"); fig.hidden=false; }
    else{ qimg.removeAttribute("src"); fig.hidden=true; }
    getId("prompt").textContent=t("choose_prompt");
    getId("prompt").style.display = state.answered ? "none" : "";

    var box=getId("options"); box.innerHTML="";
    q.opts.forEach(function(opt,idx){
      var b=document.createElement("button");
      b.className="opt"; b.type="button"; b.setAttribute("role","radio"); b.setAttribute("lang",state.lang);
      var badge=document.createElement("span"); badge.className="opt-badge";
      var txt=document.createElement("span"); txt.className="opt-text"; txt.textContent=L(opt);
      b.appendChild(badge); b.appendChild(txt);
      if(!state.answered){
        badge.textContent=LETTERS[idx]; b.setAttribute("aria-checked","false");
        b.addEventListener("click",function(){ choose(idx); });
      }else{
        b.setAttribute("aria-disabled","true"); b.setAttribute("tabindex","-1");
        if(idx===q.answer){ b.classList.add("correct"); badge.textContent="✓"; }
        else if(idx===state.chosen){ b.classList.add("incorrect"); badge.textContent="✗"; }
        else{ badge.textContent=LETTERS[idx]; }
        b.setAttribute("aria-checked", idx===state.chosen ? "true":"false");
      }
      box.appendChild(b);
    });

    var exp=getId("explain");
    if(state.answered){
      var right=state.chosen===q.answer;
      exp.hidden=false; exp.className="explain "+(right?"ok":"err");
      var st=getId("exp-status"); st.innerHTML="";
      var mk=document.createElement("span"); mk.className="mark"; mk.textContent=right?"✓":"✗";
      var lbl=document.createElement("span"); lbl.textContent=right?t("correct_label"):t("incorrect_label");
      st.appendChild(mk); st.appendChild(lbl);
      getId("exp-body").textContent=L(q.why);
      getId("citation-text").textContent = q.page ? t("citation_chip",{PAGE:q.page}) : t("citation_practice");
    }else{
      exp.hidden=true; exp.className="explain";
    }

    // action zone — always present; primary appears only after an answer
    var last=state.pos===state.order.length-1;
    var nb=getId("nextbtn");
    nb.hidden=!state.answered;
    nb.textContent=last?t("done_button"):t("next_button");
    if(!state.answered){ getId("actions").classList.remove("reveal"); }
    paintRestartInline();
  }

  function choose(idx){
    if(state.answered) return;
    state.answered=true; state.chosen=idx;
    var q=curQ(); var right=idx===q.answer;
    state.answeredCount++;
    if(right){ state.score++; } else { state.missed.push(state.order[state.pos]); }
    render();
    getId("explain").classList.add("reveal");
    var az=getId("actions"); az.classList.add("reveal");
    var letter=LETTERS[q.answer];
    getId("live").textContent=(right?t("status_correct_full",{LETTER:letter}):t("status_incorrect_full",{LETTER:letter}))+" "+L(q.why);
    az.scrollIntoView({block:"nearest", behavior:reduceMotion()?"auto":"smooth"});
    getId("nextbtn").focus();
  }

  function next(){
    if(!state.answered) return;
    disarmRestart();
    state.pos++; state.answered=false; state.chosen=null;
    render();
    if(state.pos<state.order.length){
      window.scrollTo({top:0,behavior:"auto"});
      getId("question").focus();
    }
  }

  function renderEnd(){
    getId("quizarea").hidden=true; getId("endarea").hidden=false;
    var total=state.order.length;
    var pct=total?Math.round(state.score/total*100):0;
    getId("counter").textContent=t("progress_counter",{N:total,TOTAL:total});
    paintScore();
    getId("railfill").style.width="100%";
    getId("endhead").textContent=t("end_headline",{SCORE:state.score,TOTAL:total,PCT:pct});
    getId("endline").textContent = state.missed.length===0
        ? t("end_perfect",{N:total})
        : (pct>=80 ? t("end_verdict_pass",{PCT:pct}) : t("end_verdict_fail",{PCT:pct}));

    var rb=getId("reviewbtn"), sb=getId("restartbtn");
    if(state.missed.length>0){
      rb.hidden=false; rb.className="nextbtn"; rb.textContent=t("review_missed",{N:state.missed.length});
      sb.className="btn-secondary"; sb.textContent=t("new_test");
    }else{
      rb.hidden=true; sb.className="nextbtn"; sb.textContent=t("new_test");
    }
    getId("live").textContent=t("end_headline",{SCORE:state.score,TOTAL:total,PCT:pct});
  }

  // ---- restart (mid-quiz, 2-tap confirm) ----
  function onRestartInline(){
    if(restartArmed){ disarmRestart(); startAll(); return; }
    restartArmed=true; paintRestartInline();
    restartTimer=setTimeout(disarmRestart, 3000);
  }
  function disarmRestart(){
    restartArmed=false;
    if(restartTimer){ clearTimeout(restartTimer); restartTimer=null; }
    var el=getId("restart-inline"); if(el){ el.textContent=t("start_over"); el.classList.remove("confirm"); }
  }

  // ---- sessions ----
  function resetCounters(){ state.pos=0; state.answered=false; state.chosen=null; state.score=0; state.answeredCount=0; state.missed=[]; }
  function startAll(){ disarmRestart(); dealSession(); resetCounters(); render(); window.scrollTo({top:0}); }
  function reviewMissed(){
    if(state.missed.length===0) return;
    disarmRestart();
    var m=state.missed.slice();
    resetCounters(); state.order=m;
    render(); window.scrollTo({top:0});
  }

  // ---- events ----
  getId("themebtn").addEventListener("click",toggleTheme);
  getId("homebtn").addEventListener("click",showLanding);
  getId("agreebtn").addEventListener("click",function(){ enterQuiz(false); });
  getId("seg-en").addEventListener("click",function(){ setLang("en"); });
  getId("seg-ru").addEventListener("click",function(){ setLang("ru"); });
  getId("nextbtn").addEventListener("click",next);
  getId("restart-inline").addEventListener("click",onRestartInline);
  getId("restartbtn").addEventListener("click",startAll);
  getId("reviewbtn").addEventListener("click",reviewMissed);
  window.addEventListener("resize",paintScore);
  document.addEventListener("keydown",function(e){
    if(e.key>="1" && e.key<="4" && !state.answered && state.pos<state.order.length){
      var idx=parseInt(e.key,10)-1; if(idx<curQ().opts.length){ choose(idx); }
    }else if(e.key==="Enter" && state.answered){ next(); }
  });

  bootTheme();
  bootLang();
  getId("seg-en").setAttribute("aria-checked", state.lang==="en");
  getId("seg-ru").setAttribute("aria-checked", state.lang==="ru");
  var agreed=false; try{ agreed=localStorage.getItem("moto_agreed")==="1"; }catch(e){}
  if(agreed){ enterQuiz(true); } else { showLanding(); }
})();
</script>
</body>
</html>
